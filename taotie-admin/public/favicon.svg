<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 简化饕餮纹 Logo -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#g)"/>
  <!-- 饕餮纹抽象图形：对称兽面 -->
  <g fill="#F59E0B" opacity="0.95">
    <!-- 双眼 -->
    <circle cx="22" cy="26" r="5"/>
    <circle cx="42" cy="26" r="5"/>
    <!-- 眼珠 -->
    <circle cx="22" cy="26" r="2" fill="#0C0A1D"/>
    <circle cx="42" cy="26" r="2" fill="#0C0A1D"/>
    <!-- 角 -->
    <path d="M14 18 Q18 8 24 14" stroke="#F59E0B" stroke-width="2.5" fill="none"/>
    <path d="M50 18 Q46 8 40 14" stroke="#F59E0B" stroke-width="2.5" fill="none"/>
    <!-- 鼻 -->
    <path d="M30 32 Q32 36 34 32" stroke="#F59E0B" stroke-width="2" fill="none"/>
    <!-- 口 -->
    <path d="M22 42 Q32 50 42 42" stroke="#F59E0B" stroke-width="2.5" fill="none"/>
  </g>
</svg>
