server:
  port: 8081 # 独立端口依然留着

spring:
  application:
    name: taotie-auth # 告诉 Nacos 我叫什么名字

  main:
    allow-circular-references: true

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        file-extension: yml
  profiles:
    active: dev